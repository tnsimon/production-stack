apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: inference-gateway
  rules:
  - matches:
    - headers:
      - type: Exact
        name: X-Gateway-Model-Name
        value: falcon-7b-instruct
      path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: falcon-7b-instruct-inferencepool
      group: inference.networking.k8s.io
      kind: InferencePool
  - matches:
    - headers:
      - type: Exact
        name: X-Gateway-Model-Name
        value: ministral-3-3b-instruct
      path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ministral-3-3b-instruct-inferencepool
      group: inference.networking.k8s.io
      kind: InferencePool
  # Catch-all rule: must be last. Handles any request whose model name did not
  # match any rule above (BBR injected x-gateway-model-name, but no HTTPRoute
  # rule matched it). Routes to a dedicated error service that returns an
  # OpenAI-compatible 404 JSON response instead of Envoy's bare 404.
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: model-not-found
      kind: Service
      port: 80
