# Network Policies for the default namespace.
# Locks down ingress traffic while allowing:
#   - Ingress from the Istio ingress gateway (istio-system namespace)
#   - Intra-namespace traffic (inference pods, EPP, BBR, gateway talking to each other)
---
# 1. Default deny all ingress traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# 2. Allow legitimate ingress traffic patterns.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-inference-traffic
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow from Istio ingress gateway namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # Allow intra-namespace traffic (gateway -> BBR -> EPP -> inference pods).
    - from:
        - podSelector: {}
    # Allow traffic from kube-system namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
