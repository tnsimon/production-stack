apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-node-mocker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gpu-node-mocker.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gpu-node-mocker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-node-mocker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gpu-node-mocker.fullname" . }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --shadow-pod-image={{ .Values.shadowPod.image }}
            - --uds-tokenizer-image={{ .Values.shadowPod.udsTokenizerImage }}
            - --lease-duration-seconds={{ .Values.leaseDurationSeconds }}
            - --lease-renew-interval-seconds={{ .Values.leaseRenewIntervalSeconds }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
